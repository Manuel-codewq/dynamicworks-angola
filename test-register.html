<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Registo - Deriv</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0e1a;
            color: #dde8f8;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #131c2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #243452;
        }
        h1 { color: #00d4ff; font-size: 1.3rem; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #7a9cc0; }
        input {
            width: 100%;
            padding: 12px;
            background: #0f1521;
            border: 1px solid #243452;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button.secondary { background: #6c3fff; color: #fff; }
        .log-box {
            background: #06090f;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #1c2a40; }
        .log-entry.error { color: #ff3d5a; }
        .log-entry.success { color: #00e676; }
        .step { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            margin-right: 10px;
            font-size: 0.7rem;
        }
        .step.active { background: #00d4ff20; border: 1px solid #00d4ff; color: #00d4ff; }
        .step.completed { background: #00e67620; border-color: #00e676; color: #00e676; }
        hr { border-color: #243452; margin: 16px 0; }
        .highlight {
            background: #00d4ff10;
            border: 1px solid #00d4ff30;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste de Registo Deriv</h1>
        
        <div style="margin-bottom: 15px;">
            <span class="step" id="step1">1. Email</span> → 
            <span class="step" id="step2">2. Código</span> → 
            <span class="step" id="step3">3. Criar Conta</span>
        </div>

        <!-- STEP 1 -->
        <div id="panel1">
            <div class="form-group">
                <label>📧 Email (NOVO, nunca usado)</label>
                <input type="email" id="testEmail" placeholder="exemplo@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Password (ex: Teste@1234)</label>
                <input type="password" id="testPassword" placeholder="8+ chars, Maiúscula, número, símbolo">
            </div>
            <button id="btnSendCode">📨 Enviar Código</button>
        </div>

        <!-- STEP 2 -->
        <div id="panel2" style="display:none;">
            <div class="highlight">
                📧 <strong>Verifica o teu email</strong><br>
                Copia o código que está no link que recebeste<br>
                Exemplo: <code style="background:#000; padding:2px 6px; border-radius:4px;">7V6uw7v7</code>
            </div>
            <div class="form-group">
                <label>🔑 Código de Verificação</label>
                <input type="text" id="verificationCode" placeholder="Copia e cola o código aqui" style="font-family: monospace; font-size: 1rem; text-align: center;">
            </div>
            <button id="btnCreateAccount" class="secondary">✅ Criar Conta</button>
            <button id="btnBack" style="background:transparent; border:1px solid #243452;">← Voltar</button>
        </div>

        <!-- STEP 3 -->
        <div id="panel3" style="display:none; text-align:center;">
            <div style="font-size:3rem;">🎉</div>
            <h3>Conta criada com sucesso!</h3>
            <button id="btnReset">🔄 Testar Outra</button>
        </div>

        <div class="log-box" id="logContainer"></div>
    </div>

    <script>
        let currentWs = null;
        let currentEmail = '';
        let currentPassword = '';
        
        function addLog(msg, type = 'info') {
            const log = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            console.log(msg);
        }
        
        function setStep(step) {
            const s1 = document.getElementById('step1');
            const s2 = document.getElementById('step2');
            const s3 = document.getElementById('step3');
            [s1, s2, s3].forEach((s, i) => {
                s.classList.remove('active', 'completed');
                if (i + 1 < step) s.classList.add('completed');
                if (i + 1 === step) s.classList.add('active');
            });
            document.getElementById('panel1').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('panel2').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('panel3').style.display = step === 3 ? 'block' : 'none';
        }
        
        // Enviar código
        document.getElementById('btnSendCode').onclick = function() {
            const email = document.getElementById('testEmail').value.trim().toLowerCase();
            const password = document.getElementById('testPassword').value;
            
            if (!email || !email.includes('@')) {
                addLog('❌ Email inválido', 'error');
                return;
            }
            if (password.length < 8) {
                addLog('❌ Password muito curta (mín 8)', 'error');
                return;
            }
            
            currentEmail = email;
            currentPassword = password;
            
            addLog(`📧 Enviando código para ${email}...`, 'info');
            
            if (currentWs) currentWs.close();
            currentWs = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=127916');
            
            currentWs.onopen = () => {
                currentWs.send(JSON.stringify({ verify_email: email, type: 'account_opening' }));
            };
            
            currentWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.error) {
                    addLog(`❌ Erro: ${data.error.message}`, 'error');
                    return;
                }
                if (data.verify_email === 1) {
                    addLog(`✅ Código enviado! Verifica o teu email.`, 'success');
                    addLog(`📧 O código está no LINK do email. Exemplo: ?code=7V6uw7v7`, 'info');
                    addLog(`💡 COPIA o código e cola no campo abaixo.`, 'info');
                    setStep(2);
                }
            };
        };
        
        // Criar conta
        document.getElementById('btnCreateAccount').onclick = function() {
            const code = document.getElementById('verificationCode').value.trim();
            
            if (!code) {
                addLog(`❌ Insere o código (copia do email)`, 'error');
                return;
            }
            
            addLog(`🔑 Criando conta com código: ${code}`, 'info');
            
            if (currentWs) currentWs.close();
            currentWs = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=127916');
            
            currentWs.onopen = () => {
                currentWs.send(JSON.stringify({
                    new_account_virtual: 1,
                    client_password: currentPassword,
                    verification_code: code,
                    residence: 'ao',
                    type: 'trading'
                }));
            };
            
            currentWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.error) {
                    addLog(`❌ ERRO: ${data.error.code} - ${data.error.message}`, 'error');
                    if (data.error.code === 'InvalidVerificationToken') {
                        addLog(`💡 Código inválido. Copia corretamente do email.`, 'error');
                        addLog(`💡 Exemplo de código: 7V6uw7v7 (8 caracteres)`, 'info');
                    }
                    return;
                }
                if (data.new_account_virtual) {
                    addLog(`🎉 SUCESSO! Conta criada!`, 'success');
                    setStep(3);
                }
            };
        };
        
        document.getElementById('btnBack').onclick = () => setStep(1);
        document.getElementById('btnReset').onclick = () => {
            setStep(1);
            document.getElementById('testEmail').value = '';
            document.getElementById('testPassword').value = '';
            document.getElementById('verificationCode').value = '';
            addLog('🔄 Reset', 'info');
        };
    </script>
</body>
</html>
