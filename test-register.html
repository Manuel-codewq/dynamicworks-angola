<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Registo - Deriv API</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #dde8f8;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #131c2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #243452;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #00d4ff; }
        .url-box {
            background: #06090f;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            border: 1px solid #00d4ff30;
        }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; font-weight: 600; color: #7a9cc0; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f1521;
            border: 1px solid #243452;
            border-radius: 8px;
            color: #dde8f8;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button.secondary { background: linear-gradient(135deg, #6c3fff, #4a1dcc); color: #fff; }
        .log-box {
            background: #06090f;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #243452;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #1c2a40; }
        .log-entry.error { color: #ff3d5a; }
        .log-entry.success { color: #00e676; }
        .step-indicator { display: flex; gap: 10px; margin-bottom: 20px; }
        .step { flex: 1; text-align: center; padding: 8px; background: #0f1521; border-radius: 8px; font-size: 0.7rem; }
        .step.active { background: #00d4ff20; border: 1px solid #00d4ff; color: #00d4ff; }
        .step.completed { background: #00e67620; border-color: #00e676; color: #00e676; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste de Registo Deriv</h1>
        
        <div class="url-box">
            <strong>📍 URL ATUAL:</strong><br>
            <span id="currentUrl"></span>
        </div>
        
        <div class="step-indicator">
            <div class="step" id="step1">1. Enviar Email</div>
            <div class="step" id="step2">2. Verificar Código</div>
            <div class="step" id="step3">3. Criar Conta</div>
        </div>

        <div id="panel1">
            <div class="form-group">
                <label>📧 Email (NOVO, nunca usado na Deriv)</label>
                <input type="email" id="testEmail" placeholder="exemplo@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Password (ex: Teste@1234)</label>
                <input type="password" id="testPassword" placeholder="Maiúscula, minúscula, número, símbolo">
            </div>
            <button id="btnSendCode">📨 Enviar Código</button>
        </div>

        <div id="panel2" style="display:none;">
            <div class="form-group">
                <label>🔑 Código de Verificação</label>
                <input type="text" id="verificationCode" placeholder="Código do email" style="font-family: monospace;">
                <small style="color:#7a9cc0; display:block; margin-top:5px;">💡 O código deve aparecer automaticamente se clicares no link do email</small>
            </div>
            <button id="btnCreateAccount" class="secondary">✅ Criar Conta</button>
            <button id="btnBack" style="background:transparent; border:1px solid #243452;">← Voltar</button>
        </div>

        <div id="panel3" style="display:none; text-align:center; padding:20px;">
            <div style="font-size:3rem;">🎉</div>
            <h3>Conta criada com sucesso!</h3>
            <button id="btnReset">🔄 Testar Outra</button>
        </div>

        <div class="log-box">
            <div style="margin-bottom:8px; font-weight:bold;">📋 Log:</div>
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        // Mostrar URL atual
        document.getElementById('currentUrl').textContent = window.location.href;
        
        let currentWs = null;
        let currentEmail = '', currentPassword = '';
        
        function addLog(msg, type = 'info') {
            const log = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            console.log(msg);
        }
        
        // EXTRAIR CÓDIGO DO URL - VERSÃO COMPLETA
        function extractCodeFromURL() {
            const fullUrl = window.location.href;
            addLog(`🔍 A analisar URL: ${fullUrl}`, 'info');
            
            // Método 1: Parâmetros normais
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('code');
            if (code && code.length >= 4) {
                addLog(`✅ Código encontrado via ?code=: ${code}`, 'success');
                return code;
            }
            
            // Método 2: Hash
            if (window.location.hash) {
                const hash = window.location.hash.replace('#', '');
                const hashParams = new URLSearchParams(hash);
                code = hashParams.get('code');
                if (code && code.length >= 4) {
                    addLog(`✅ Código encontrado via #code=: ${code}`, 'success');
                    return code;
                }
            }
            
            // Método 3: Regex em toda a string
            const regexMatch = fullUrl.match(/[?&#]code=([A-Za-z0-9_\-]{4,32})/i);
            if (regexMatch && regexMatch[1]) {
                addLog(`✅ Código encontrado via regex: ${regexMatch[1]}`, 'success');
                return regexMatch[1];
            }
            
            // Método 4: Path como /verify/XXXXX
            const pathMatch = fullUrl.match(/\/([A-Za-z0-9_\-]{8,32})(?:\?|$|#)/);
            if (pathMatch && pathMatch[1] && pathMatch[1].length >= 8) {
                addLog(`✅ Possível código no path: ${pathMatch[1]}`, 'success');
                return pathMatch[1];
            }
            
            addLog(`⚠️ Nenhum código encontrado na URL`, 'error');
            return null;
        }
        
        // Verificar código ao carregar
        window.addEventListener('DOMContentLoaded', function() {
            const code = extractCodeFromURL();
            if (code) {
                const codeInput = document.getElementById('verificationCode');
                if (codeInput) {
                    codeInput.value = code;
                    addLog(`📋 Código preenchido automaticamente!`, 'success');
                }
            }
        });
        
        // Enviar código
        document.getElementById('btnSendCode').onclick = function() {
            const email = document.getElementById('testEmail').value.trim().toLowerCase();
            const password = document.getElementById('testPassword').value;
            
            if (!email || !email.includes('@')) { addLog('❌ Email inválido', 'error'); return; }
            if (!password || password.length < 8) { addLog('❌ Password muito curta (mín 8)', 'error'); return; }
            
            currentEmail = email;
            currentPassword = password;
            
            addLog(`📧 Enviando código para ${email}...`, 'info');
            
            if (currentWs) currentWs.close();
            currentWs = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=127916');
            
            currentWs.onopen = () => {
                addLog(`🔌 WebSocket conectado`, 'success');
                currentWs.send(JSON.stringify({ verify_email: email, type: 'account_opening' }));
            };
            
            currentWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                addLog(`📨 Resposta: ${JSON.stringify(data)}`, 'info');
                
                if (data.error) {
                    addLog(`❌ Erro: ${data.error.code} - ${data.error.message}`, 'error');
                    return;
                }
                
                if (data.verify_email === 1) {
                    addLog(`✅ Código enviado! Verifica o teu email.`, 'success');
                    addLog(`📧 Depois de clicares no link do email, volta aqui.`, 'info');
                    document.getElementById('panel1').style.display = 'none';
                    document.getElementById('panel2').style.display = 'block';
                    document.getElementById('step1').classList.add('completed');
                    document.getElementById('step2').classList.add('active');
                }
            };
            
            currentWs.onerror = () => addLog(`❌ Erro WebSocket`, 'error');
        };
        
        // Criar conta
        document.getElementById('btnCreateAccount').onclick = function() {
            const code = document.getElementById('verificationCode').value.trim();
            
            if (!code) {
                addLog(`❌ Insere o código de verificação`, 'error');
                return;
            }
            
            addLog(`🔑 A criar conta com código: ${code}`, 'info');
            
            if (currentWs) currentWs.close();
            currentWs = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=127916');
            
            currentWs.onopen = () => {
                currentWs.send(JSON.stringify({
                    new_account_virtual: 1,
                    client_password: currentPassword,
                    verification_code: code,
                    residence: 'ao',
                    type: 'trading'
                }));
            };
            
            currentWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                addLog(`📨 Resposta: ${JSON.stringify(data)}`, 'info');
                
                if (data.error) {
                    addLog(`❌ ERRO: ${data.error.code} - ${data.error.message}`, 'error');
                    return;
                }
                
                if (data.new_account_virtual) {
                    addLog(`🎉 SUCESSO! Conta criada!`, 'success');
                    document.getElementById('panel2').style.display = 'none';
                    document.getElementById('panel3').style.display = 'block';
                    document.getElementById('step2').classList.add('completed');
                    document.getElementById('step3').classList.add('active');
                }
            };
        };
        
        document.getElementById('btnBack').onclick = () => location.reload();
        document.getElementById('btnReset').onclick = () => location.reload();
    </script>
</body>
</html>
