<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="robots" content="noindex, nofollow"/>
<title>404 — Página não encontrada · DynamicWorks Angola</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2306090f'/><polyline points='4,22 10,14 16,18 22,8 28,12' fill='none' stroke='%2300d4ff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='28' cy='12' r='2' fill='%2300d4ff'/></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070d;--bg2:#080d18;--card:#0c1220;
  --border:#162035;--border2:#1e2e48;
  --accent:#00d4ff;--accent2:#6c3fff;
  --green:#00e676;--red:#ff3d5a;--yellow:#ffc107;--purple:#a78bfa;
  --text:#dde8f8;--text2:#6a8aaa;--text3:#2d4560;
  --mono:'JetBrains Mono',monospace;--font:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font);overflow:hidden;
}

/* ── BACKGROUND GRID ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* ── GLOW BLOBS ── */
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%,rgba(0,212,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 70%,rgba(108,63,255,.06) 0%,transparent 60%);
  pointer-events:none;
}

/* ── CHART ANIMATION ── */
.chart-wrap{
  position:fixed;bottom:0;left:0;right:0;height:180px;
  opacity:.07;pointer-events:none;
}
.chart-wrap svg{ width:100%;height:100%; }

/* ── MAIN ── */
.page{
  position:relative;z-index:10;
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem;text-align:center;
}

/* ── ERROR CODE ── */
.err-code{
  font-family:var(--mono);font-size:clamp(5rem,20vw,8rem);
  font-weight:700;letter-spacing:-.04em;line-height:1;
  color:transparent;
  background:linear-gradient(135deg,var(--accent) 0%,rgba(0,212,255,.3) 50%,var(--accent2) 100%);
  -webkit-background-clip:text;background-clip:text;
  animation:glitch 4s infinite;
  margin-bottom:.25rem;
  position:relative;
}
.err-code::before,.err-code::after{
  content:'404';position:absolute;inset:0;
  background:inherit;-webkit-background-clip:text;background-clip:text;
  color:transparent;
}
.err-code::before{ animation:glitch-r 4s infinite; clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%); }
.err-code::after { animation:glitch-b 4s infinite; clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%); }

@keyframes glitch{
  0%,90%,100%{transform:none}
  91%{transform:translate(-2px,1px)}
  92%{transform:translate(2px,-1px)}
  93%{transform:none}
}
@keyframes glitch-r{
  0%,88%,100%{transform:none;opacity:0}
  89%{transform:translate(3px,0);opacity:.6;filter:hue-rotate(90deg)}
  90%{transform:translate(-3px,0);opacity:.6}
  91%{opacity:0}
}
@keyframes glitch-b{
  0%,91%,100%{transform:none;opacity:0}
  92%{transform:translate(-3px,0);opacity:.5;filter:hue-rotate(-90deg)}
  93%{transform:translate(3px,0);opacity:.5}
  94%{opacity:0}
}

/* ── BADGE ── */
.err-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.25);
  color:var(--red);border-radius:99px;padding:.3rem .85rem;
  font-size:.65rem;font-family:var(--mono);font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:1.25rem;
  animation:fadeUp .6s .1s both;
}
.err-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--red);animation:blink 1.2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── TITLE ── */
.err-title{
  font-size:clamp(1.2rem,5vw,1.6rem);font-weight:900;
  color:var(--text);margin-bottom:.5rem;
  animation:fadeUp .6s .2s both;
}
.err-sub{
  font-size:.85rem;color:var(--text2);font-family:var(--mono);
  line-height:1.65;max-width:340px;
  animation:fadeUp .6s .3s both;margin-bottom:2rem;
}
.err-sub strong{color:var(--accent)}

/* ── TERMINAL BOX ── */
.terminal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  padding:.75rem 1rem;font-family:var(--mono);font-size:.72rem;
  color:var(--text3);text-align:left;max-width:360px;width:100%;
  margin-bottom:1.75rem;animation:fadeUp .6s .35s both;
}
.terminal-line{display:flex;gap:.5rem;line-height:1.8}
.terminal-prompt{color:var(--accent);flex-shrink:0}
.terminal-cmd{color:var(--text2)}
.terminal-out{color:var(--red);margin-left:1.1rem}

/* ── BUTTONS ── */
.btn-group{
  display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:280px;
  animation:fadeUp .6s .45s both;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.75rem 1.5rem;border-radius:12px;font-size:.88rem;font-weight:700;
  cursor:pointer;border:none;text-decoration:none;transition:all .15s;
  font-family:var(--font);
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#0099bb);
  color:#000;
}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-ghost{
  background:rgba(255,255,255,.04);border:1px solid var(--border2);
  color:var(--text2);
}
.btn-ghost:active{background:rgba(255,255,255,.08)}

/* ── LOGO ── */
.top-logo{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;z-index:20;
}
.logo-text{font-size:.95rem;font-weight:900;color:#fff;letter-spacing:-.02em;text-decoration:none}
.logo-text span{color:var(--accent)}
.logo-code{
  font-size:.6rem;font-family:var(--mono);color:var(--text3);
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:.2rem .5rem;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
</style>
</head>
<body>

<!-- Gráfico de fundo -->
<div class="chart-wrap">
  <svg viewBox="0 0 1440 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,140 120,110 240,125 360,80 480,95 600,60 720,85 840,45 960,70 1080,40 1200,60 1320,30 1440,50"
      fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="0,140 120,110 240,125 360,80 480,95 600,60 720,85 840,45 960,70 1080,40 1200,60 1320,30 1440,50 1440,180 0,180"
      fill="url(#grad404)" opacity=".4"/>
    <defs>
      <linearGradient id="grad404" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00d4ff" stop-opacity=".3"/>
        <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<!-- Logo -->
<div class="top-logo">
  <a href="/index.html" class="logo-text">Dynamic<span>Works</span></a>
  <span class="logo-code">ERR_404</span>
</div>

<!-- Conteúdo -->
<div class="page">
  <div class="err-code">404</div>

  <div class="err-badge">Página não encontrada</div>

  <h1 class="err-title">Sinal perdido no mercado</h1>
  <p class="err-sub">
    A página que procuras não existe ou foi movida.<br>
    Verifica o endereço ou volta para a <strong>plataforma</strong>.
  </p>

  <div class="terminal">
    <div class="terminal-line">
      <span class="terminal-prompt">$</span>
      <span class="terminal-cmd">GET /página-solicitada</span>
    </div>
    <div class="terminal-line">
      <span class="terminal-out">→ HTTP 404 Not Found</span>
    </div>
    <div class="terminal-line">
      <span class="terminal-out">→ Recurso inexistente</span>
    </div>
  </div>

  <div class="btn-group">
    <a href="/index.html" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 9 12 2 21 9"/><path d="M9 22V12h6v10"/><path d="M3 9v13h18V9"/></svg>
      Ir para a Plataforma
    </a>
    <button class="btn btn-ghost" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Voltar à página anterior
    </button>
  </div>
</div>

</body>
</html>
