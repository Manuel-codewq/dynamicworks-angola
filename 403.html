<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="robots" content="noindex, nofollow"/>
<title>403 — Acesso negado · DynamicWorks Angola</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2306090f'/><polyline points='4,22 10,14 16,18 22,8 28,12' fill='none' stroke='%2300d4ff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='28' cy='12' r='2' fill='%2300d4ff'/></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070d;--bg2:#080d18;--card:#0c1220;
  --border:#162035;--border2:#1e2e48;
  --accent:#00d4ff;--accent2:#6c3fff;
  --green:#00e676;--red:#ff3d5a;--yellow:#ffc107;--purple:#a78bfa;
  --text:#dde8f8;--text2:#6a8aaa;--text3:#2d4560;
  --mono:'JetBrains Mono',monospace;--font:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,61,90,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,61,90,.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 50% at 50% 40%,rgba(255,61,90,.08) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 80% 80%,rgba(108,63,255,.05) 0%,transparent 60%);
  pointer-events:none;
}

/* ── LOCK ICON ANIMATED ── */
.lock-wrap{
  position:relative;width:80px;height:80px;margin:0 auto 1.5rem;
  animation:fadeUp .5s both;
}
.lock-ring{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(255,61,90,.3);
  display:flex;align-items:center;justify-content:center;
  animation:pulse-ring 2.5s ease-in-out infinite;
}
.lock-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(255,61,90,.12);
  animation:pulse-ring 2.5s ease-in-out infinite .4s;
}
@keyframes pulse-ring{
  0%,100%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.06);opacity:1}
}
.lock-svg{
  width:32px;height:32px;stroke:var(--red);stroke-width:1.8;
  fill:none;stroke-linecap:round;stroke-linejoin:round;
}

/* ── ERROR CODE ── */
.err-code{
  font-family:var(--mono);font-size:clamp(5rem,20vw,8rem);
  font-weight:700;letter-spacing:-.04em;line-height:1;
  color:transparent;
  background:linear-gradient(135deg,var(--red) 0%,rgba(255,61,90,.4) 50%,#ff6b8a 100%);
  -webkit-background-clip:text;background-clip:text;
  margin-bottom:.25rem;
  animation:fadeUp .5s .05s both;
}

.err-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.25);
  color:var(--red);border-radius:99px;padding:.3rem .85rem;
  font-size:.65rem;font-family:var(--mono);font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:1.25rem;animation:fadeUp .5s .15s both;
}
.err-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--red);animation:blink 1.2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.err-title{
  font-size:clamp(1.2rem,5vw,1.6rem);font-weight:900;color:var(--text);
  margin-bottom:.5rem;animation:fadeUp .5s .2s both;
}
.err-sub{
  font-size:.85rem;color:var(--text2);font-family:var(--mono);
  line-height:1.65;max-width:340px;
  animation:fadeUp .5s .25s both;margin-bottom:1.75rem;
}
.err-sub strong{color:var(--yellow)}

.terminal{
  background:var(--bg2);border:1px solid rgba(255,61,90,.2);border-radius:12px;
  padding:.75rem 1rem;font-family:var(--mono);font-size:.72rem;
  color:var(--text3);text-align:left;max-width:360px;width:100%;
  margin-bottom:1.75rem;animation:fadeUp .5s .3s both;
}
.terminal-line{display:flex;gap:.5rem;line-height:1.8}
.terminal-prompt{color:var(--red);flex-shrink:0}
.terminal-cmd{color:var(--text2)}
.terminal-out{color:var(--yellow);margin-left:1.1rem}
.terminal-out.red{color:var(--red)}

.btn-group{
  display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:280px;
  animation:fadeUp .5s .38s both;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.75rem 1.5rem;border-radius:12px;font-size:.88rem;font-weight:700;
  cursor:pointer;border:none;text-decoration:none;transition:all .15s;
  font-family:var(--font);
}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),#8b5cf6);color:#fff;
}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-ghost{
  background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text2);
}
.btn-ghost:active{background:rgba(255,255,255,.08)}

.page{
  position:relative;z-index:10;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;text-align:center;
}

.top-logo{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;z-index:20;
}
.logo-text{font-size:.95rem;font-weight:900;color:#fff;letter-spacing:-.02em;text-decoration:none}
.logo-text span{color:var(--accent)}
.logo-code{
  font-size:.6rem;font-family:var(--mono);color:var(--red);
  background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.2);
  border-radius:6px;padding:.2rem .5rem;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="top-logo">
  <a href="/index.html" class="logo-text">Dynamic<span>Works</span></a>
  <span class="logo-code">ERR_403</span>
</div>

<div class="page">

  <div class="lock-wrap">
    <div class="lock-ring">
      <svg class="lock-svg" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
  </div>

  <div class="err-code">403</div>

  <div class="err-badge">Acesso negado</div>

  <h1 class="err-title">Zona restrita</h1>
  <p class="err-sub">
    Não tens permissão para aceder a esta área.<br>
    Faz login com uma conta <strong>autorizada</strong> ou contacta o administrador.
  </p>

  <div class="terminal">
    <div class="terminal-line">
      <span class="terminal-prompt">$</span>
      <span class="terminal-cmd">access /área-restrita</span>
    </div>
    <div class="terminal-line">
      <span class="terminal-out red">→ HTTP 403 Forbidden</span>
    </div>
    <div class="terminal-line">
      <span class="terminal-out">→ Credenciais insuficientes</span>
    </div>
    <div class="terminal-line">
      <span class="terminal-out">→ Contacta o administrador</span>
    </div>
  </div>

  <div class="btn-group">
    <a href="/index.html" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Fazer Login
    </a>
    <button class="btn btn-ghost" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Voltar atrás
    </button>
  </div>

</div>
</body>
</html>
